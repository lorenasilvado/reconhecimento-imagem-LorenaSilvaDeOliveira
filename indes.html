<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Lorena Oliveira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .brand-header {
            background: linear-gradient(45deg, #007bff, #6610f2);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        #webcam-container canvas {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            max-width: 100%;
            height: auto !important;
            border: 4px solid white;
        }
        .prediction-bar {
            height: 20px;
            border-radius: 10px;
            background-color: #e9ecef;
        }
        .card {
            border-radius: 20px;
        }
        .class-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #495057;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 text-center">
            
            <div class="brand-header shadow-sm">
                Site Lorena Oliveira
            </div>
            
            <div class="card shadow-lg border-0 p-4 p-md-5">
                <h3 class="mb-4 fw-bold">Reconhecimento de Imagem</h3>
                
                <p class="text-muted mb-4">Clique no botão abaixo para ativar sua câmera e iniciar a predição do modelo.</p>

                <button type="button" class="btn btn-primary btn-lg px-5 py-3 mb-4 rounded-pill shadow" onclick="init()">
                    Ativar Câmera
                </button>

                <div id="webcam-container" class="mb-4 d-flex justify-content-center"></div>

                <div id="label-container" class="text-start mt-2">
                    </div>
            </div>

            <footer class="mt-4 text-muted small">
                © 2026 - Inteligência Artificial Aplicada
            </footer>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/ut2sEtJAo/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        webcam = new tmImage.Webcam(300, 300, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        
        labelContainer.innerHTML = '';
        
        for (let i = 0; i < maxPredictions; i++) {
            const classWrapper = document.createElement("div");
            classWrapper.className = "mb-3";
            classWrapper.innerHTML = `
                <div class="d-flex justify-content-between class-label mb-1">
                    <span id="label-text-${i}">Carregando...</span>
                    <span id="label-prob-${i}">0%</span>
                </div>
                <div class="progress prediction-bar shadow-sm">
                    <div id="bar-${i}" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" 
                         role="progressbar" style="width: 0%"></div>
                </div>
            `;
            labelContainer.appendChild(classWrapper);
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0);
            
            document.getElementById(`label-text-${i}`).innerText = className;
            document.getElementById(`label-prob-${i}`).innerText = probability + "%";
            
            const progressBar = document.getElementById(`bar-${i}`);
            progressBar.style.width = probability + "%";
            
            // Lógica de cores para facilitar a leitura
            if(probability > 80) {
                progressBar.className = "progress-bar progress-bar-striped progress-bar-animated bg-success";
            } else if(probability > 40) {
                progressBar.className = "progress-bar progress-bar-striped progress-bar-animated bg-primary";
            } else {
                progressBar.className = "progress-bar progress-bar-striped progress-bar-animated bg-secondary";
            }
        }
    }
</script>

</body>
</html>
